spring:
  application:
    name: e-commerece
  h2:
    console:
      enabled: true
  datasource:
    url: jdbc:h2:mem:ecomdb
    driverClassName: org.h2.Driver
    username: sa
    password: password
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true

